<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOE Team</title>
    <style>
        /* 字体定义 - 修正为 tree 命令显示的连字符路径 */
        @font-face {
            font-family: 'Poppins-Bold';
            src: url('fonts/Poppins-Bold.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Poppins-Medium';
            src: url('fonts/Poppins-Medium.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        .top-app-bar {
            height: 64px;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 40px;
            cursor: pointer;
        }

        /* GitHub 图标样式 - 移除了 filter: invert(1) */
        .github-icon img {
            width: 32px;
            height: 32px;
            transition: opacity 0.3s;
        }

        .github-icon img:hover {
            opacity: 0.8;
        }

        /* 右侧箭头图标依然保持白色反色 */
        .white-icon {
            filter: invert(1);
        }

        /* 主体内容布局 */
        .content-container {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
        }

        .text-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .title {
            font-family: 'Poppins-Bold', sans-serif;
            font-size: 5rem;
            margin-bottom: 16px;
        }

        .description-group {
            font-family: 'Poppins-Medium', sans-serif;
            font-size: 2.5rem;
            line-height: 1.6;
        }

        /* 描边文字 (Outline) */
        .outline-text {
            color: transparent;
            -webkit-text-stroke: 1.2px #FFFFFF;
            display: inline-block;
            min-height: 1.2em;
            border-right: 3px solid #FFFFFF;
            padding-right: 4px;
            animation: cursor-blink 0.8s infinite;
        }

        @keyframes cursor-blink {
            50% { border-color: transparent; }
        }

        /* 了解更多按钮 */
        .learn-more {
            text-decoration: none;
            color: #FFFFFF;
            font-family: 'Poppins-Medium', sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.3s ease;
        }

        .learn-more:hover {
            transform: translateX(8px);
        }

        .arrow {
            width: 28px;
            height: 28px;
        }

        /* 移动端适配 */
        @media (max-width: 900px) {
            .content-container {
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
                gap: 60px;
            }
            .title { font-size: 3.5rem; }
            .description-group { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header class="top-app-bar">
        <a href="https://HOE-Team.github.io" class="logo">
            <img src="svg/hoe-team.svg" alt="HOE Team Logo">
        </a>
        <a href="https://github.com/HOE-Team" class="github-icon">
            <img src="svg/github.svg" alt="GitHub">
        </a>
    </header>

    <main class="content-container">
        <div class="text-column">
            <h1 class="title">HOE Team</h1>
            <div class="description-group">
                <p class="filled-text">用代码构建</p>
                <p class="typewriter-container">
                    <span id="typewriter" class="outline-text"></span>
                </p>
                <p class="filled-text">的技术世界</p>
            </div>
        </div>

        <div class="action-button">
            <a href="about.html" class="learn-more">
                了解更多
                <img src="svg/arrow_forward.svg" class="white-icon arrow" alt="Arrow">
            </a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
