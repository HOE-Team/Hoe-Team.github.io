<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOE Team</title>
    <style>
        /* 1. 字体定义 */
        @font-face {
            font-family: 'Poppins-Bold';
            src: url('fonts/Poppins-Bold.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Poppins-Medium';
            src: url('fonts/Poppins-Medium.ttf') format('truetype');
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #000000;
            color: #FFFFFF;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 2. 顶部导航栏 */
        .top-app-bar {
            height: 64px;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo img { height: 30px; cursor: pointer; }
        .github-icon img { width: 32px; height: 32px; transition: opacity 0.3s; }
        .github-icon img:hover { opacity: 0.8; }
        .white-icon { filter: invert(1); }

        /* 3. 主体内容布局 (桌面端) */
        .content-container {
            flex: 1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
        }
        .text-column { display: flex; flex-direction: column; align-items: flex-start; }
        .title { font-family: 'Poppins-Bold', sans-serif; font-size: 5rem; margin-bottom: 16px; }
        .description-group { font-family: 'Poppins-Medium', sans-serif; font-size: 2.5rem; line-height: 1.6; }

        /* 打字机文字效果 */
        .outline-text {
            color: transparent;
            -webkit-text-stroke: 1.2px #FFFFFF;
            display: inline-block;
            min-height: 1.2em;
            border-right: 3px solid #FFFFFF;
            padding-right: 4px;
            animation: cursor-blink 0.8s infinite;
        }
        @keyframes cursor-blink { 50% { border-color: transparent; } }

        /* 按钮组 */
        .button-group { display: flex; flex-direction: column; gap: 20px; }
        .learn-more {
            text-decoration: none;
            color: #FFFFFF;
            font-family: 'Poppins-Medium', sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.3s ease;
        }
        .learn-more:hover { transform: translateX(8px); }
        .arrow { width: 28px; height: 28px; }

        /* 4. 版权信息栏 */
        .copyright {
            padding: 20px 0;
            text-align: center;
            font-size: 0.8rem;
            color: #666666;
            font-family: 'Poppins-Medium', sans-serif;
            line-height: 1.6;
            background: #000;
        }
        .copyright a { color: #666666; text-decoration: underline; }

        /* 5. 移动端适配 */
        @media (max-width: 900px) {
            .content-container {
                flex-direction: column;
                /* 将 justify-content 改为 center 以防万一，但主要靠 padding 控制位置 */
                justify-content: flex-start; 
                /* 关键修改：将 padding-top 从 15vh 减小到 5vh，使元素上移 */
                padding-top: 5vh; 
                align-items: flex-start;
                gap: 40px;
            }
            .title { font-size: 3.5rem; }
            .description-group { font-size: 1.8rem; }
            .button-group { gap: 15px; }
            .learn-more { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <header class="top-app-bar">
        <a href="https://HOE-Team.github.io" class="logo">
            <img src="svg/hoe-team.svg" alt="HOE Team Logo">
        </a>
        <a href="https://github.com/HOE-Team" class="github-icon">
            <img src="svg/github.svg" alt="GitHub">
        </a>
    </header>

    <main class="content-container">
        <div class="text-column">
            <h1 class="title">HOE Team</h1>
            <div class="description-group">
                <p class="filled-text">用代码构建</p>
                <p class="typewriter-container">
                    <span id="typewriter" class="outline-text"></span>
                </p>
                <p class="filled-text">的技术世界</p>
            </div>
        </div>

        <div class="button-group">
            <a href="about.html" class="learn-more">
                关于我们 <img src="svg/arrow_forward.svg" class="white-icon arrow">
            </a>
            <a href="projects.html" class="learn-more">
                项目一览 <img src="svg/arrow_forward.svg" class="white-icon arrow">
            </a>
            <a href="contact_us.html" class="learn-more">
                联系我们 <img src="svg/arrow_forward.svg" class="white-icon arrow">
            </a>
        </div>
    </main>

    <footer class="copyright">
        ©2026 HOE Team. <br>
        使用了OFL <a href="https://github.com/itfoundry/Poppins/blob/master/OFL.txt"></a> 协议开源的Poppins字体及 <a href="https://www.apache.org/licenses/LICENSE-2.0">Apache 2.0</a> 开源的 Material Icons 图标
    </footer>

    <script src="script.js"></script>
</body>
</html>
